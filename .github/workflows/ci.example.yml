# =============================================================================
# EXEMPLO DE CI — ponto de partida para o desafio.
#
# Este workflow é um ESQUELETO comentado. Sinta-se à vontade para adaptá-lo,
# reescrevê-lo ou substituí-lo por GitLab CI / outro. O importante é que o
# pipeline reflita as boas práticas do seu nível (ver levels/).
#
# Júnior : lint + test + build da imagem (sem push).
# Pleno  : adicione push da imagem versionada para um registry.
# Sênior : adicione scan de vulnerabilidades, deploy e gates.
# =============================================================================

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Júnior: apenas builda para garantir que o Dockerfile é válido.
      - name: Build image
        run: docker build -t devops-challenge:${{ github.sha }} .

      # -------------------------------------------------------------------
      # PLENO em diante: descomente e configure o push para um registry.
